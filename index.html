<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Veggie Story - Order Now</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <!-- Header -->
  <header>
    <h1>🍽️ The Veggie Story</h1>
    <p>Pure Veg Multicuisine Restaurant in Pondicherry</p>
  </header>

  <!-- Main Content -->
  <main id="mainContent">
    
    <!-- Customer Details Form -->
    <section class="customer-section">
      <h2>Order Details</h2>
      <div class="form-container">
        <div class="form-group">
          <label for="customerName">Customer Name *</label>
          <input type="text" id="customerName" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
          <label for="mobileNumber">Mobile Number *</label>
          <input type="tel" id="mobileNumber" placeholder="Enter your mobile number" required>
        </div>

        <div class="form-group">
          <label for="deliveryAddress">Delivery Address</label>
          <textarea id="deliveryAddress" placeholder="Enter your delivery address (required for Delivery orders)" rows="3"></textarea>
        </div>

        <div class="form-group">
          <label>Order Type *</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="orderType" value="Dine In" checked>
              <span>Dine In</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="orderType" value="Delivery">
              <span>Delivery</span>
            </label>
          </div>
        </div>
      </div>
    </section>

    <!-- Menu Section -->
    <section class="menu-section">
      <h2>Select Items</h2>
      <div class="menu-grid" id="menuGrid">
        <!-- Menu items will be generated by JavaScript -->
      </div>
    </section>

    <!-- Cart Section -->
    <section class="cart-section">
      <h2>Your Order</h2>
      <div class="cart-container">
        <div class="cart-items" id="cartItems">
          <p class="empty-cart">No items selected yet</p>
        </div>
        <div class="cart-summary">
          <div class="summary-row">
            <span>Subtotal:</span>
            <span id="subtotal">₹0</span>
          </div>
          <div class="summary-row">
            <span>Tax (5%):</span>
            <span id="tax">₹0</span>
          </div>
          <div class="summary-row total">
            <span>Total:</span>
            <span id="total">₹0</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Place Order Button -->
    <section class="order-action">
      <button id="placeOrderBtn" class="place-order-btn" onclick="placeOrder()">Place Order on WhatsApp</button>
    </section>

  </main>

  <!-- Success Screen -->
  <div id="successScreen" class="success-screen hidden">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <h1>Thank You for Ordering!</h1>
      <p>Thank you for ordering from <strong>The Veggie Story</strong></p>
      <div class="success-details">
        <p><strong>Order ID:</strong> <span id="successOrderId"></span></p>
        <p>Your order has been sent to WhatsApp</p>
      </div>
      <button class="new-order-btn" onclick="resetOrder()">Place Another Order</button>
    </div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
