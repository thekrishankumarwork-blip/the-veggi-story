<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Veggie Story</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>The Veggie Story</h1>
<p>Pure Veg Multicuisine Restaurant in Pondicherry</p>
</header>

<section class="customer">
<h2>Place Your Order</h2>

<input type="text" id="name" placeholder="Customer Name">
<input type="text" id="phone" placeholder="Mobile Number">

</section>

<section class="menu">

<div class="item">
<h2>Veggie Tandoori Platter</h2>
<p>₹479</p>
<button onclick="orderNow('Veggie Tandoori Platter',479)">Order</button>
</div>

<div class="item">
<h2>Sunday Special Thali</h2>
<p>₹279</p>
<button onclick="orderNow('Sunday Special Thali',279)">Order</button>
</div>

<div class="item">
<h2>Paneer Butter Masala</h2>
<p>₹249</p>
<button onclick="orderNow('Paneer Butter Masala',249)">Order</button>
</div>

</section>

<script src="script.js"></script>

</body>
</html>
